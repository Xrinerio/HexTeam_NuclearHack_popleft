<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            background: #1a1d23;
            color: #c9d1d9;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Левая панель */
        .sidebar {
            width: 350px;
            background: #22252b;
            border-right: 1px solid #2d3139;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 16px;
            background: #1a1d23;
            border-bottom: 1px solid #2d3139;
        }

        .header h1 {
            font-size: 1.2rem;
            color: #f0f6fc;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .status {
            font-size: 0.75rem;
            color: #8b949e;
        }

        .ws-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }

        /* Информация о себе */
        .self-info {
            padding: 12px 16px;
            background: #2a2e35;
            border-bottom: 1px solid #2d3139;
        }

        .self-info-title {
            font-size: 0.7rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .self-info-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 4px 12px;
            font-size: 0.8rem;
        }

        .self-info-label {
            color: #6e7681;
        }

        .self-info-value {
            color: #c9d1d9;
            word-break: break-all;
            font-size: 0.75rem;
            line-height: 1.3;
        }

        /* Поиск */
        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid #2d3139;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            background: #1a1d23;
            border: 1px solid #2d3139;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
        }

        .search-input:focus {
            border-color: #58a6ff;
        }

        .search-input::placeholder {
            color: #6e7681;
        }

        /* Список пиров */
        .peers-list {
            flex: 1;
            overflow-y: auto;
        }

        .peers-list::-webkit-scrollbar {
            width: 8px;
        }

        .peers-list::-webkit-scrollbar-track {
            background: #22252b;
        }

        .peers-list::-webkit-scrollbar-thumb {
            background: #2d3139;
            border-radius: 4px;
        }

        .peers-list::-webkit-scrollbar-thumb:hover {
            background: #3d4149;
        }

        .peer-item {
            padding: 12px 16px;
            border-bottom: 1px solid #2d3139;
            cursor: pointer;
            transition: background 0.15s;
        }

        .peer-item:hover {
            background: #2a2e35;
        }

        .peer-item.active {
            background: #2d3542;
            border-left: 3px solid #58a6ff;
        }

        .peer-name {
            font-size: 0.9rem;
            color: #f0f6fc;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
        }

        .peer-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3fb950;
            margin-right: 8px;
            box-shadow: 0 0 4px #3fb95066;
        }

        .peer-details {
            font-size: 0.7rem;
            color: #8b949e;
            word-break: break-all;
            line-height: 1.2;
        }

        .empty-msg {
            color: #6e7681;
            padding: 2rem 1rem;
            text-align: center;
            font-size: 0.85rem;
        }

        /* Правая панель - чат */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1d23;
        }

        .chat-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6e7681;
            font-size: 1.1rem;
        }

        .chat-header {
            padding: 16px 20px;
            background: #22252b;
            border-bottom: 1px solid #2d3139;
        }

        .chat-header-name {
            font-size: 1.1rem;
            color: #f0f6fc;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .chat-header-info {
            font-size: 0.75rem;
            color: #8b949e;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #1a1d23;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #2d3139;
            border-radius: 4px;
        }

        .message {
            margin-bottom: 16px;
            max-width: 70%;
        }

        .message.sent {
            margin-left: auto;
        }

        .message.received {
            margin-right: auto;
        }

        .message-header {
            font-size: 0.75rem;
            color: #8b949e;
            margin-bottom: 4px;
            padding: 0 4px;
        }

        .message-content {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            word-wrap: break-word;
        }

        .message.sent .message-content {
            background: #2d4a6e;
            color: #e6edf3;
        }

        .message.received .message-content {
            background: #2a2e35;
            color: #c9d1d9;
        }

        .message-time {
            font-size: 0.7rem;
            color: #6e7681;
            margin-top: 4px;
            padding: 0 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .delivery-status {
            font-size: 0.7rem;
        }

        .delivery-status.pending {
            color: #8b949e;
        }

        .delivery-status.delivered {
            color: #3fb950;
        }

        .chat-input-area {
            padding: 16px 20px;
            background: #22252b;
            border-top: 1px solid #2d3139;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 10px 14px;
            background: #1a1d23;
            border: 1px solid #2d3139;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 0.9rem;
            font-family: 'JetBrains Mono', monospace;
            resize: none;
            max-height: 120px;
            outline: none;
            overflow: hidden;
        }

        .chat-input:focus {
            border-color: #58a6ff;
        }

        .chat-input::placeholder {
            color: #6e7681;
        }

        .send-btn {
            padding: 10px 20px;
            background: #58a6ff;
            color: #0d1117;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .send-btn:hover {
            background: #79c0ff;
            transform: translateY(-1px);
        }

        .send-btn:active {
            background: #4184e4;
            transform: translateY(0);
        }

        .send-btn:disabled {
            background: #2d3139;
            color: #6e7681;
            cursor: not-allowed;
            transform: none;
        }

        .file-btn {
            padding: 10px 16px;
            background: #2d3139;
            color: #c9d1d9;
            border: 1px solid #3d4149;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.15s;
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Модальное окно для ввода имени */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-overlay.hidden {
            display: none;
        }

        .modal-box {
            background: #22252b;
            border: 1px solid #2d3139;
            border-radius: 12px;
            padding: 32px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .modal-title {
            font-size: 1.4rem;
            color: #f0f6fc;
            margin-bottom: 12px;
            font-weight: 600;
            text-align: center;
        }

        .modal-subtitle {
            font-size: 0.85rem;
            color: #8b949e;
            margin-bottom: 24px;
            text-align: center;
            line-height: 1.5;
        }

        .modal-input {
            width: 100%;
            padding: 12px 16px;
            background: #1a1d23;
            border: 1px solid #2d3139;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            margin-bottom: 20px;
        }

        .modal-input:focus {
            border-color: #58a6ff;
        }

        .modal-input::placeholder {
            color: #6e7681;
        }

        .modal-btn {
            width: 100%;
            padding: 12px 20px;
            background: #58a6ff;
            color: #0d1117;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-btn:hover {
            background: #79c0ff;
            transform: translateY(-1px);
        }

        .modal-btn:active {
            background: #4184e4;
            transform: translateY(0);
        }

        .modal-btn:disabled {
            background: #2d3139;
            color: #6e7681;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Левая панель -->
        <div class="sidebar">
            <div class="header">
                <h1>P2P Chat</h1>
                <div class="status" id="ws-status">
                    <span class="ws-dot"
                        style="background:#6e7681"></span>Подключение...
                </div>
            </div>

            <!-- Информация о себе -->
            <div class="self-info">
                <div class="self-info-title">This Node</div>
                <div class="self-info-grid">
                    <span class="self-info-label">Name:</span>
                    <span class="self-info-value" id="me-name">—</span>
                    <span class="self-info-label">ID:</span>
                    <span class="self-info-value" id="me-id"
                        title="Полный peer ID">—</span>
                </div>
            </div>

            <!-- Поиск -->
            <div class="search-box">
                <input type="text" class="search-input" id="search-input"
                    placeholder="Search peers...">
            </div>

            <!-- Список пиров -->
            <div class="peers-list" id="peers-list">
                <div class="empty-msg">Поиск пиров...</div>
            </div>
        </div>

        <!-- Правая панель - чат -->
        <div class="chat-panel" id="chat-panel">
            <div class="chat-empty">
                Выберите пир для начала общения
            </div>
        </div>
    </div>

    <!-- Модальное окно для ввода имени -->
    <div class="modal-overlay hidden" id="name-modal">
        <div class="modal-box">
            <div class="modal-title">Добро пожаловать в P2P Chat</div>
            <div class="modal-subtitle">Пожалуйста, введите ваше имя для
                продолжения. Оно будет видно другим пользователям в сети.</div>
            <input type="text" class="modal-input" id="name-input"
                placeholder="Ваше имя" maxlength="64" autofocus>
            <button class="modal-btn" id="name-submit">Продолжить</button>
        </div>
    </div>

    <script>
        let myInfo = null;
        let peers = [];
        let selectedPeer = null;
        let messages = {};
        let ws = null;

        // WebSocket connection
        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/api/ws`);

            ws.onopen = () => {
                console.log('[WS] Connected');
                updateStatus('connected');
            };

            ws.onclose = () => {
                console.log('[WS] Disconnected, reconnecting...');
                updateStatus('disconnected');
                setTimeout(connectWebSocket, 2000);
            };

            ws.onerror = () => {
                ws.close();
            };

            ws.onmessage = (event) => {
                const packet = JSON.parse(event.data);
                handleWsEvent(packet.event, packet.data);
            };
        }

        function handleWsEvent(event, data) {
            if (event === 'new_message') {
                const peerId = data.is_outgoing ? data.to_peer_id : data.from_peer_id;
                if (!messages[peerId]) messages[peerId] = [];
                // Avoid duplicates
                if (!messages[peerId].some(m => m.message_id === data.message_id)) {
                    messages[peerId].push(data);
                }
                if (selectedPeer && selectedPeer.node_id === peerId) {
                    renderMessages();
                }
            } else if (event === 'message_delivered') {
                // Update delivery status in all chats
                for (const peerId in messages) {
                    const msg = messages[peerId].find(m => m.message_id === data.message_id);
                    if (msg) {
                        msg.delivered = true;
                        if (selectedPeer && selectedPeer.node_id === peerId) {
                            renderMessages();
                        }
                        break;
                    }
                }
            }
        }

        // Функция для показа модального окна регистрации
        function showNameModal() {
            const modal = document.getElementById('name-modal');
            const input = document.getElementById('name-input');
            const submitBtn = document.getElementById('name-submit');

            modal.classList.remove('hidden');
            input.focus();

            const handleSubmit = async () => {
                const username = input.value.trim();
                if (!username) {
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Регистрация...';

                try {
                    const response = await fetch("/api/register", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username: username })
                    });

                    if (!response.ok) {
                        const error = await response.json();
                        alert(error.detail || 'Ошибка регистрации');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Продолжить';
                        return;
                    }

                    const userData = await response.json();
                    modal.classList.add('hidden');
                    initializeApp(userData);
                } catch (err) {
                    console.error("Registration error:", err);
                    alert('Ошибка регистрации. Попробуйте еще раз.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Продолжить';
                }
            };

            submitBtn.onclick = handleSubmit;
            input.onkeydown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSubmit();
                }
            };
        }

        // Проверка регистрации при загрузке
        async function checkUserRegistration() {
            try {
                const response = await fetch("/api/me");
                if (response.ok) {
                    const userData = await response.json();
                    initializeApp(userData);
                } else if (response.status === 404) {
                    // Пользователь не зарегистрирован
                    showNameModal();
                } else {
                    console.error("Failed to check registration:", response.status);
                    showNameModal();
                }
            } catch (err) {
                console.error("Error checking registration:", err);
                showNameModal();
            }
        }

        // Инициализация приложения
        function initializeApp(userData) {
            myInfo = userData;
            document.getElementById("me-id").textContent = userData.peer_id;
            document.getElementById("me-name").textContent = userData.username;

            // Запускаем WebSocket и polling для обновления списка пиров
            connectWebSocket();
            updateStatus('connected');
            startPeersPolling();
        }

        // При загрузке страницы проверяем регистрацию
        checkUserRegistration();

        // Экранирование HTML
        function escapeHtml(str) {
            const el = document.createElement("span");
            el.textContent = str;
            return el.innerHTML;
        }

        // Форматирование времени
        function formatTime(ts) {
            return new Date(ts * 1000).toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Рендер списка пиров
        function renderPeersList(filterText = "") {
            const listEl = document.getElementById("peers-list");
            const filter = filterText.toLowerCase();
            const filtered = peers.filter(p =>
                p.name.toLowerCase().includes(filter) ||
                p.node_id.toLowerCase().includes(filter)
            );

            if (!filtered.length) {
                listEl.innerHTML = '<div class="empty-msg">Пиры не найдены</div>';
                return;
            }

            let html = "";
            for (const peer of filtered) {
                const active = selectedPeer && selectedPeer.node_id === peer.node_id ? "active" : "";
                html += `
                    <div class="peer-item ${active}" data-peer-id="${escapeHtml(peer.node_id)}">
                        <div class="peer-name">
                            <span class="peer-status-dot"></span>
                            ${escapeHtml(peer.name)}
                        </div>
                        <div class="peer-details">
                            ${escapeHtml(peer.node_id)}
                        </div>
                    </div>
                `;
            }
            listEl.innerHTML = html;

            // Обработчики кликов
            document.querySelectorAll(".peer-item").forEach(el => {
                el.addEventListener("click", () => {
                    const peerId = el.getAttribute("data-peer-id");
                    selectPeer(peerId);
                });
            });
        }

        // Выбор пира
        function selectPeer(peerId) {
            selectedPeer = peers.find(p => p.node_id === peerId);
            if (!selectedPeer) return;

            renderPeersList(document.getElementById("search-input").value);
            renderChat();
            loadMessages(peerId);
        }

        // Рендер окна чата
        function renderChat() {
            const panel = document.getElementById("chat-panel");
            if (!selectedPeer) {
                panel.innerHTML = '<div class="chat-empty">Выберите пир для начала общения</div>';
                return;
            }

            panel.innerHTML = `
                <div class="chat-header">
                    <div class="chat-header-name">${escapeHtml(selectedPeer.name)}</div>
                    <div class="chat-header-info">
                        ${escapeHtml(selectedPeer.node_id)} • ${escapeHtml(selectedPeer.ip)}:${selectedPeer.port}
                    </div>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <div class="empty-msg">Загрузка сообщений...</div>
                </div>
                <div class="chat-input-area">
                    <div class="chat-input-wrapper">
                        <button class="file-btn" title="File sharing (coming soon)" disabled>📎</button>
                        <textarea class="chat-input" id="chat-input" placeholder="Напишите сообщение..." rows="1"></textarea>
                        <button class="send-btn" id="send-btn">Отправить</button>
                    </div>
                </div>
            `;

            // Обработчики
            const input = document.getElementById("chat-input");
            const sendBtn = document.getElementById("send-btn");

            input.addEventListener("input", () => {
                input.style.height = "auto";
                input.style.height = input.scrollHeight + "px";
            });

            input.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            sendBtn.addEventListener("click", sendMessage);
        }

        // Загрузка сообщений
        async function loadMessages(peerId) {
            try {
                const res = await fetch(`/api/messages/${peerId}`);
                const data = await res.json();
                messages[peerId] = data;
                renderMessages();
            } catch (err) {
                console.error("Ошибка загрузки сообщений:", err);
            }
        }

        // Рендер сообщений
        function renderMessages() {
            if (!selectedPeer) return;

            const container = document.getElementById("chat-messages");
            const peerMessages = messages[selectedPeer.node_id] || [];

            if (!peerMessages.length) {
                container.innerHTML = '<div class="empty-msg">Пока нет сообщений. Начните беседу!</div>';
                return;
            }

            let html = "";
            for (const msg of peerMessages) {
                const isSent = msg.is_outgoing;
                const type = isSent ? "sent" : "received";
                const deliveryIcon = isSent
                    ? (msg.delivered
                        ? '<span class="delivery-status delivered" title="Доставлено">✓✓</span>'
                        : '<span class="delivery-status pending" title="Отправлено">✓</span>')
                    : '';
                html += `
                    <div class="message ${type}" data-msg-id="${escapeHtml(msg.message_id || '')}">
                        <div class="message-header">${isSent ? "Вы" : escapeHtml(selectedPeer.name)}</div>
                        <div class="message-content">${escapeHtml(msg.content)}</div>
                        <div class="message-time">
                            ${formatTime(msg.timestamp)}
                            ${deliveryIcon}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        // Отправка сообщения
        async function sendMessage() {
            if (!selectedPeer) return;

            const input = document.getElementById("chat-input");
            const content = input.value.trim();
            if (!content) return;

            input.value = "";
            input.style.height = "auto";

            try {
                const res = await fetch("/api/messages", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        peer_id: selectedPeer.node_id,
                        content: content
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    alert(err.detail || "Ошибка отправки");
                }
                // Message will appear via WebSocket broadcast
            } catch (err) {
                console.error("Ошибка отправки сообщения:", err);
                alert("Не удалось отправить сообщение");
            }
        }

        // Поиск
        document.getElementById("search-input").addEventListener("input", (e) => {
            renderPeersList(e.target.value);
        });

        // Функция для обновления статуса подключения
        function updateStatus(status) {
            const statusEl = document.getElementById("ws-status");
            if (status === 'connected') {
                statusEl.innerHTML = '<span class="ws-dot" style="background:#3fb950"></span>Подключено';
            } else {
                statusEl.innerHTML = '<span class="ws-dot" style="background:#f85149"></span>Отключено';
            }
        }

        // Polling для обновления списка пиров
        let peersPollingInterval = null;

        function startPeersPolling() {
            // Первое обновление сразу
            updatePeersList();

            // Обновляем каждые 3 секунды
            peersPollingInterval = setInterval(updatePeersList, 3000);
        }

        async function updatePeersList() {
            try {
                const response = await fetch("/api/peers");
                if (!response.ok) {
                    updateStatus('disconnected');
                    return;
                }

                const data = await response.json();
                peers = data || [];
                renderPeersList(document.getElementById("search-input").value);

                // Обновить информацию о выбранном пире
                if (selectedPeer) {
                    const updated = peers.find(p => p.node_id === selectedPeer.node_id);
                    if (updated) {
                        selectedPeer = updated;
                    }
                }

                updateStatus('connected');
            } catch (err) {
                console.error("Failed to fetch peers:", err);
                updateStatus('disconnected');
            }
        }
    </script>
</body>

</html>
