networks:
  # Изолированная внутренняя сеть — только node-a и node-b
  internal:
    driver: bridge
    internal: true # нет выхода наружу
    ipam:
      config:
        - subnet: 10.10.0.0/24
  # Эта сеть обеспечивает выход node-a в реальную LAN через NAT Docker
  host_bridge:
    driver: bridge

services:
  node-a:
    build: .
    container_name: node-a
    networks:
      # Подключён к хост-сети — видит реальные устройства в локальной сети
      - host_bridge
      # Подключён к внутренней сети — виден для node-b
      - internal
    ports:
      - "8001:8001" # HTTP API доступен с хост-машины
      - "6767:6767" # TCP P2P
      - "50000:50000/udp" # UDP discovery
    volumes:
      - node-a-data:/app/data
    environment:
      UVICORN_HOST: "0.0.0.0"

  node-b:
    build: .
    container_name: node-b
    networks:
      # Только внутренняя сеть — нет прямого выхода в реальную сеть
      - internal
    ports:
      - "8002:8001" # HTTP API доступен с хост-машины через проброс
    volumes:
      - node-b-data:/app/data
    environment:
      UVICORN_HOST: "0.0.0.0"
    depends_on:
      - node-a

volumes:
  node-a-data:
  node-b-data:
